
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Reading Hub - 英文閱讀測驗平台</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <!-- Central Firebase Config -->
    <script src="firebase-config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #6366f1;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --error-color: #ef4444;
            --bg-primary: #0f0f1e;
            --bg-card: rgba(255, 255, 255, 0.05);
            --text-primary: #ffffff;
            --text-secondary: #cbd5e1;
            --text-accent: #fbbf24;
            --border-color: rgba(255, 255, 255, 0.1);
            --gradient-primary: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%);
            --gradient-gold: linear-gradient(135deg, #ffd700 0%, #ffb347 100%);
        }

        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }

        .background-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 20% 80%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(236, 72, 153, 0.15) 0%, transparent 50%);
            animation: backgroundFloat 20s ease-in-out infinite;
        }

        @keyframes backgroundFloat {
            0%, 100% { transform: translateY(0px); opacity: 0.8; }
            50% { transform: translateY(-20px); opacity: 1; }
        }
        
        .full-page-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            transition: opacity 0.3s ease;
            text-align: center;
            padding: 1rem;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid var(--border-color);
            border-top: 5px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }
        
        .loading {
            display: inline-block;
            width: 1rem;
            height: 1rem;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .header {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 1rem 0;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo-icon {
            width: 3.5rem;
            height: 3.5rem;
            background: var(--gradient-primary);
            border-radius: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
        }

        .logo h1 {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .current-user {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .user-info-container {
             padding: 0.5rem 1rem;
            background: rgba(251, 191, 36, 0.1);
            border-radius: 2rem;
            border: 1px solid rgba(251, 191, 36, 0.2);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-info {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 0.2rem;
        }

        .user-nickname {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-accent);
        }

        .user-stats {
            font-size: 0.8rem;
            opacity: 0.8;
            color: var(--text-accent);
        }

        .change-nickname-btn {
            background: none;
            border: none;
            color: var(--text-accent);
            cursor: pointer;
            opacity: 0.7;
            font-size: 1.2rem;
            padding: 0.2rem;
        }
        .change-nickname-btn:hover {
            opacity: 1;
        }
        
        .btn {
            padding: 0.8rem 1.5rem;
            border-radius: 2rem;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            border: none;
        }
        
        .btn-primary {
             background: var(--primary-color);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
        }
        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.2);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }
        
        .main-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 3rem 2rem;
            display: grid;
            grid-template-columns: 2.5fr 1fr;
            gap: 3rem;
        }

        .welcome-section {
            text-align: center;
            margin-bottom: 2rem;
            padding: 4rem 2rem;
            background: var(--bg-card);
            border-radius: 2rem;
            border: 1px solid var(--border-color);
        }

        .welcome-section h2 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
        }

        .welcome-section p {
            font-size: 1.3rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        .stats-row {
            display: flex;
            justify-content: center;
            gap: 3rem;
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            display: block;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        .subject-selector {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 3rem;
        }
        .subject-btn {
            font-family: inherit;
            font-size: 1.1rem;
            font-weight: 600;
            padding: 0.8rem 2rem;
            border-radius: 2rem;
            border: 2px solid var(--border-color);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .subject-btn:hover {
            border-color: var(--primary-color);
            color: var(--text-primary);
        }
        .subject-btn.active {
            background: var(--primary-color);
            border-color: var(--primary-color);
            color: white;
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.2);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .articles-section h3, .leaderboard-section h3 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .search-bar {
            flex-grow: 1;
            max-width: 400px;
        }
        
        .search-input {
            width: 100%;
            padding: 0.8rem 1.2rem;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--border-color);
            border-radius: 2rem;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .search-input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .articles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 2rem;
            min-height: 200px;
        }

        .article-card {
            background: var(--bg-card);
            border-radius: 1.5rem;
            overflow: hidden;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(20px);
            transition: all 0.4s ease;
            display: flex;
            flex-direction: column;
        }

        .article-card:hover {
            transform: translateY(-15px) scale(1.02);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            border-color: var(--primary-color);
        }
        
        .article-content-wrapper {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            padding: 2rem;
        }
        
        .article-badges {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .badge {
            padding: 0.4rem 1rem;
            border-radius: 1.5rem;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .difficulty-basic { background: rgba(16, 185, 129, 0.2); color: var(--success-color); }
        .difficulty-intermediate { background: rgba(245, 158, 11, 0.2); color: var(--warning-color); }
        .difficulty-advanced { background: rgba(239, 68, 68, 0.2); color: var(--error-color); }
        .category-badge { background: rgba(99, 102, 241, 0.2); color: var(--primary-color); }

        .article-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 1rem;
            line-height: 1.4;
        }

        .article-preview {
            color: var(--text-secondary);
            font-size: 1rem;
            line-height: 1.6;
        }

        .article-meta {
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
            border-top: 1px solid var(--border-color);
        }

        .meta-info {
            display: flex;
            gap: 1.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .start-test-btn {
            background: var(--gradient-primary);
            color: white;
            border: none;
            border-radius: 1rem;
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .leaderboard-section {
            background: var(--bg-card);
            border-radius: 1.5rem;
            padding: 2.5rem;
            border: 1px solid var(--border-color);
            height: fit-content;
            position: sticky;
            top: 8rem;
        }
        
        .leaderboard-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .leaderboard-item {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 1.2rem;
        }

        .leaderboard-item.current-user-highlight {
            background: rgba(251, 191, 36, 0.1);
            border: 1px solid rgba(251, 191, 36, 0.3);
        }

        .rank-badge {
            width: 3rem;
            height: 3rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .rank-1 { background: var(--gradient-gold); color: #000; }
        .rank-2 { background: linear-gradient(135deg, #c0c0c0, #a8a8a8); color: #000; }
        .rank-3 { background: linear-gradient(135deg, #cd7f32, #b8860b); color: #fff; }
        .rank-other { background: rgba(255, 255, 255, 0.1); color: var(--text-secondary); }

        .player-info { flex: 1; min-width: 0; }
        .player-name { font-weight: 600; margin-bottom: 0.25rem; font-size: 1.1rem; }
        .player-rank { font-size: 0.8rem; color: var(--text-accent); }
        .player-score { font-weight: 700; font-size: 1.3rem; }

        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; opacity: 1; transition: opacity 0.3s ease;
        }
        .modal.hidden { opacity: 0; pointer-events: none; }

        .modal-content {
            background: var(--bg-card); border-radius: 2rem; padding: 3rem;
            border: 1px solid var(--border-color);
            max-width: 450px; width: 90%; text-align: center;
        }
        .modal-icon {
            width: 5rem; height: 5rem; background: var(--gradient-primary);
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; margin: 0 auto 2rem; font-size: 2.5rem;
        }
        .modal-title { font-size: 1.8rem; font-weight: 700; margin-bottom: 1rem; }
        .modal-description { color: var(--text-secondary); margin-bottom: 2.5rem; }

        .modal-form { display: flex; flex-direction: column; gap: 1.5rem; }
        .modal-input {
            padding: 1rem; background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--border-color); border-radius: 1rem;
            color: var(--text-primary); font-size: 1rem; text-align: left;
            transition: all 0.3s ease;
        }
        .modal-input:focus {
            outline: none; border-color: var(--primary-color);
            background: rgba(255, 255, 255, 0.08);
        }
        .modal-btn {
            padding: 1rem 2rem; background: var(--gradient-primary); border: none;
            border-radius: 1rem; color: white; font-weight: 600;
            cursor: pointer; transition: all 0.3s ease; font-size: 1rem;
        }
        .modal-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .message-box {
            border-radius: 1rem; padding: 1rem; font-size: 0.9rem;
        }
        .message-box.error { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: var(--error-color); }
        .message-box.success { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); color: var(--success-color); }

        .notification-container {
            position: fixed;
            top: 1rem; right: 1rem; z-index: 9999;
            display: flex; flex-direction: column; gap: 0.5rem;
            align-items: flex-end;
        }
        .notification {
            padding: 1rem 1.5rem; border-radius: 0.75rem;
            color: white; font-weight: 600;
            animation: slideInRight 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .notification.success { background: var(--success-color); }
        .notification.error { background: var(--error-color); }
        @keyframes slideInRight {
            from { transform: translateX(110%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .skeleton {
            background-color: rgba(255, 255, 255, 0.08); border-radius: 0.5rem;
            position: relative; overflow: hidden;
        }
        .skeleton::after {
            content: ''; position: absolute; top: 0; left: -150%;
            width: 150%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 0% { left: -150%; } 100% { left: 150%; } }
        .article-card.skeleton { height: 350px; cursor: default; }
        .article-card.skeleton:hover { transform: none; box-shadow: none; border-color: var(--border-color); }
        .leaderboard-item.skeleton { height: 90px; }


        @media (max-width: 1024px) {
            .main-content { grid-template-columns: 1fr; gap: 2rem; }
            .leaderboard-section { position: static; order: -1; }
        }
        @media (max-width: 768px) {
            .header-content { flex-direction: column; gap: 1.5rem; }
            .main-content { padding: 2rem 1rem; }
            .welcome-section h2 { font-size: 2.5rem; }
            .articles-grid { grid-template-columns: 1fr; }
        }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div class="background-animation"></div>
    <div id="notification-container" class="notification-container"></div>
    
    <div id="loader" class="full-page-loader">
        <div class="spinner"></div>
        <p>正在載入內容...</p>
    </div>

    <!-- Auth Modal for Login -->
    <div class="modal hidden" id="authModal">
        <div class="modal-content" style="max-width: 480px; padding: 2.5rem; text-align: left;">
            <h2 class="modal-title" style="text-align: center; margin-bottom: 2rem;">請先登入</h2>
            
            <!-- Login Form -->
            <form id="loginForm" class="modal-form">
                <input type="email" id="loginEmail" class="modal-input" placeholder="電子郵件" required autocomplete="email">
                <input type="password" id="loginPassword" class="modal-input" placeholder="密碼" required autocomplete="current-password">
                <button type="submit" id="loginBtn" class="modal-btn">
                    <span class="btn-text">登入</span>
                    <span class="loading hidden"></span>
                </button>
            </form>
            <div id="authMessageBox" class="message-box" style="display:none; margin-top: 1.5rem;"></div>
        </div>
    </div>
    
    <!-- Change Nickname Modal -->
    <div class="modal hidden" id="nicknameModal">
        <div class="modal-content">
            <h2 class="modal-title">更改您的暱稱</h2>
            <form id="nicknameForm" class="modal-form">
                <input type="text" class="modal-input" id="nicknameInput" placeholder="請輸入您的新暱稱" maxlength="10" minlength="2">
                <button type="submit" class="modal-btn" id="nicknameSubmitBtn">儲存變更</button>
            </form>
        </div>
    </div>


    <div id="app-container" style="display: none;">
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <div class="logo-icon">🎓</div>
                    <h1>Reading Hub</h1>
                </div>
                <div class="header-actions">
                    <div class="current-user" id="currentUserInfo" style="display: none;">
                        <div class="user-info-container">
                            <div class="user-info">
                                <div class="user-nickname">👋 您好，<span id="displayNickname"></span></div>
                                <div class="user-stats" id="userStats"></div>
                            </div>
                            <button class="change-nickname-btn" id="changeNicknameBtn" title="更改暱稱">✏️</button>
                        </div>
                        <button class="btn btn-secondary" id="logoutBtn">登出</button>
                    </div>
                    <div id="guestUserInfo" style="display: flex; gap: 1rem;">
                        <button class="btn btn-primary" id="showAuthModalBtn">👤 登入</button>
                        <a href="admin_login.html" class="btn btn-secondary">🔐 管理員登入</a>
                    </div>
                </div>
            </div>
        </header>

        <main class="main-content">
            <div class="content-left">
                <section class="welcome-section">
                    <h2>開始你的學習之旅</h2>
                    <p>精選優質文章，挑戰不同難度等級，提升閱讀理解能力並登上排行榜！</p>
                    <div class="stats-row">
                        <div class="stat-item"><span class="stat-number" id="totalArticles">--</span><div class="stat-label">精選文章</div></div>
                        <div class="stat-item"><span class="stat-number" id="totalTests">--</span><div class="stat-label">總測驗次數</div></div>
                        <div class="stat-item"><span class="stat-number" id="totalUsers">--</span><div class="stat-label">總學習者</div></div>
                    </div>
                </section>
                
                <div class="subject-selector">
                    <button class="subject-btn active" data-subject="english">📚 英文</button>
                    <button class="subject-btn" data-subject="chemistry">🧪 化學</button>
                </div>
                
                <div id="emptyState" style="display: none; text-align: center; padding: 4rem 2rem; background: var(--bg-card); border-radius: 1.5rem; border: 1px solid var(--border-color);">
                    <div style="font-size: 4rem; margin-bottom: 1.5rem;">🏗️</div>
                    <h3 style="font-size: 2rem; font-weight: 700; color: var(--text-primary);">此科目正在準備中</h3>
                    <p style="font-size: 1.1rem; color: var(--text-secondary); margin-top: 1rem;">我們的管理員正在努力新增文章。<br>請稍後再來看看，或選擇其他科目！</p>
                </div>

                <section class="articles-section">
                    <div class="section-header">
                        <h3 id="articles-section-title">📖 精選文章</h3>
                        <div class="search-bar">
                            <input type="search" id="articleSearchInput" class="search-input" placeholder="搜尋文章標題...">
                        </div>
                    </div>
                    <div class="articles-grid" id="articlesGrid"></div>
                    <p id="noResultsMessage" style="display:none; text-align:center; padding: 2rem;">找不到相關文章。</p>
                </section>
            </div>

            <aside class="leaderboard-section">
                <h3 id="leaderboard-section-title">🏆 得分排行榜</h3>
                <div class="leaderboard-list" id="leaderboardList"></div>
            </aside>
        </main>
    </div>

    <script>
        // --- App State ---
        const state = {
            db: null,
            auth: null,
            currentUser: null,
            currentUserData: null,
            articles: [],
            pendingArticleId: null,
            currentSubject: 'english',
            subjects: {
                english: { name: '英文', icon: '📚' },
                chemistry: { name: '化學', icon: '🧪' },
            }
        };
        
        // --- UI Module ---
        const ui = {
            loader: document.getElementById('loader'),
            appContainer: document.getElementById('app-container'),
            notificationContainer: document.getElementById('notification-container'),
            articlesSection: document.querySelector('.articles-section'),
            leaderboardSection: document.querySelector('.leaderboard-section'),
            emptyState: document.getElementById('emptyState'),
            
            showError(message, details = '') {
                this.loader.style.display = 'flex';
                this.loader.innerHTML = `<div style="color: var(--error-color);">❌ ${message}</div><p>${details}</p>`;
            },

            hideLoader() {
                this.loader.style.opacity = '0';
                setTimeout(() => { this.loader.style.display = 'none'; }, 300);
            },
            
            setLoading(btn, isLoading) {
                btn.disabled = isLoading;
                btn.querySelector('.btn-text').style.display = isLoading ? 'none' : 'inline';
                btn.querySelector('.loading').classList.toggle('hidden', !isLoading);
            },

            showNotification(message, type = 'success', duration = 3000) {
                const notification = document.createElement('div');
                notification.className = `notification ${type}`;
                notification.textContent = message;
                this.notificationContainer.appendChild(notification);
                setTimeout(() => {
                    notification.style.opacity = '0';
                    notification.style.transform = 'translateX(110%)';
                    setTimeout(() => notification.remove(), 400);
                }, duration);
            },
            
            renderSkeletons(containerId, count, skeletonClass) {
                const container = document.getElementById(containerId);
                container.innerHTML = Array(count).fill(`<div class="${skeletonClass} skeleton"></div>`).join('');
            },

            renderGlobalStats(stats) {
                document.getElementById('totalArticles').textContent = stats.articles;
                document.getElementById('totalUsers').textContent = stats.users;
                document.getElementById('totalTests').textContent = stats.sessions.toLocaleString();
            },
            
            renderArticles(articles) {
                const grid = document.getElementById('articlesGrid');
                const noResults = document.getElementById('noResultsMessage');
                grid.innerHTML = '';
                if (articles.length === 0) {
                    noResults.style.display = 'block';
                    this.articlesSection.style.display = 'block';
                    this.emptyState.style.display = 'block';
                    grid.style.display = 'none';
                    return;
                }
                this.articlesSection.style.display = 'block';
                this.emptyState.style.display = 'none';
                grid.style.display = 'grid';
                noResults.style.display = 'none';

                articles.forEach(article => {
                    const card = document.createElement('div');
                    card.className = 'article-card';
                    card.innerHTML = `
                        <div class="article-content-wrapper">
                            <div class="article-badges">
                                <span class="badge difficulty-${article.difficulty}">${article.difficulty}</span>
                                <span class="badge category-badge">${article.category}</span>
                            </div>
                            <h3 class="article-title">${article.title}</h3>
                            <p class="article-preview">${article.content.substring(0, 100)}...</p>
                        </div>
                        <div class="article-meta">
                            <div class="meta-info">
                                <div class="meta-item"><span>📝</span><span>${article.questionCount}題</span></div>
                                <div class="meta-item"><span>⏱️</span><span>${article.estimatedReadingTime}分鐘</span></div>
                            </div>
                            <button class="start-test-btn" data-id="${article.id}">開始測驗</button>
                        </div>`;
                    grid.appendChild(card);
                });
            },

            renderLeaderboard(users) {
                const list = document.getElementById('leaderboardList');
                list.innerHTML = '';
                if (users.length === 0) {
                    list.innerHTML = '<p>此科目排行榜尚無資料。</p>'; return;
                }
                users.forEach((user, index) => {
                    const rank = index + 1;
                    const rankClass = rank <= 3 ? `rank-${rank}` : 'rank-other';
                    const item = document.createElement('div');
                    item.className = 'leaderboard-item';
                    if (state.currentUser && user.id === state.currentUser.uid) {
                        item.classList.add('current-user-highlight');
                    }
                    item.innerHTML = `
                        <div class="rank-badge ${rankClass}">${rank}</div>
                        <div class="player-info">
                            <div class="player-name">${user.nickname}</div>
                            <div class="player-rank">${user[`rank_${state.currentSubject}`] || '新手級'}</div>
                        </div>
                        <div class="player-score">${user[`totalScore_${state.currentSubject}`] || 0}</div>`;
                    list.appendChild(item);
                });
            },
            
            updateHeader(user, userData) {
                const guestInfo = document.getElementById('guestUserInfo');
                const userInfo = document.getElementById('currentUserInfo');
                if (user && userData) {
                    const subject = state.currentSubject;
                    const subjectName = state.subjects[subject].name;
                    document.getElementById('displayNickname').textContent = userData.nickname;
                    document.getElementById('userStats').textContent = `${subjectName}等級: ${userData[`rank_${subject}`] || '新手級'} | ${subjectName}總分: ${userData[`totalScore_${subject}`] || 0}`;
                    guestInfo.style.display = 'none';
                    userInfo.style.display = 'flex';
                } else {
                    guestInfo.style.display = 'flex';
                    userInfo.style.display = 'none';
                }
            },
            
            showModal(id) { document.getElementById(id).classList.remove('hidden'); },
            hideModal(id) { document.getElementById(id).classList.add('hidden'); state.pendingArticleId = null; },
            showMessage(boxId, message, type = 'error') {
                const messageBox = document.getElementById(boxId);
                messageBox.className = `message-box ${type}`;
                messageBox.textContent = message;
                messageBox.style.display = 'block';
            },
            hideMessage(boxId) { document.getElementById(boxId).style.display = 'none'; }
        };
        
        // --- Handlers & Logic ---
        const handlers = {
            async init() {
                if (!firebase.apps.length) {
                    return ui.showError('設定錯誤', '請在 firebase-config.js 檔案中填寫真實的 Firebase 設定。');
                }
                state.db = firebase.firestore();
                state.auth = firebase.auth();
                this.setupEventListeners();
                this.handleAuthentication();
            },

            setupEventListeners() {
                document.getElementById('showAuthModalBtn').addEventListener('click', () => ui.showModal('authModal'));
                document.getElementById('logoutBtn').addEventListener('click', () => this.handleLogout());
                document.getElementById('loginForm').addEventListener('submit', (e) => this.handleLogin(e));

                document.getElementById('changeNicknameBtn').addEventListener('click', () => {
                    document.getElementById('nicknameInput').value = state.currentUserData.nickname;
                    ui.showModal('nicknameModal');
                });
                document.getElementById('nicknameForm').addEventListener('submit', e => this.handleChangeNickname(e));
                
                document.querySelectorAll('.modal').forEach(modal => {
                    modal.addEventListener('click', e => { if (e.target === modal) ui.hideModal(modal.id); });
                });

                document.getElementById('articlesGrid').addEventListener('click', e => {
                    const btn = e.target.closest('.start-test-btn');
                    if (btn) this.startTest(btn.dataset.id);
                });
                document.getElementById('articleSearchInput').addEventListener('input', e => this.filterArticles(e.target.value));

                document.querySelectorAll('.subject-btn').forEach(btn => {
                    btn.addEventListener('click', () => this.handleSubjectChange(btn.dataset.subject));
                });
            },
            
            handleAuthentication() {
                state.auth.onAuthStateChanged(async user => {
                    state.currentUser = user;
                    if (user) {
                        const userDocRef = state.db.collection('leaderboard').doc(user.uid);
                        let userDoc = await userDocRef.get();
                        
                        if (!userDoc.exists) {
                            try {
                                const nickname = user.email.split('@')[0];
                                const newUserProfile = {
                                    nickname: nickname,
                                    totalScore_english: 0,
                                    testsCompleted_english: 0,
                                    rank_english: '新手級',
                                    totalScore_chemistry: 0,
                                    testsCompleted_chemistry: 0,
                                    rank_chemistry: '新手級',
                                    achievements: [],
                                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                                };
                                await userDocRef.set(newUserProfile);
                                userDoc = await userDocRef.get(); // Re-fetch to get the created data
                                ui.showNotification(`歡迎您，${nickname}！已為您建立基本資料。`, 'success');
                            } catch (error) {
                                console.error("Error creating user profile:", error);
                                ui.showNotification('建立使用者資料失敗，請稍後再試。', 'error');
                                state.currentUserData = null;
                            }
                        }
                        
                        if (userDoc && userDoc.exists) {
                            state.currentUserData = { uid: user.uid, ...userDoc.data() };
                        }

                    } else {
                        state.currentUserData = null;
                    }
                    this.loadContent();
                });
            },

            async loadContent() {
                ui.appContainer.style.display = 'block';
                await this.loadGlobalStats();
                await this.loadSubjectContent(state.currentSubject);
                ui.hideLoader();
            },
            
            async loadGlobalStats() {
                 try {
                     const [articlesSnap, usersSnap, sessionsSnap] = await Promise.all([
                        state.db.collection('articles').get(),
                        state.db.collection('leaderboard').get(),
                        state.db.collection('test-sessions').get()
                    ]);
                    // Filter for active articles on the client-side
                    const activeArticles = articlesSnap.docs.filter(doc => doc.data().isActive === true).length;
                    ui.renderGlobalStats({ articles: activeArticles, users: usersSnap.size, sessions: sessionsSnap.size });
                 } catch (e) {
                     console.error("Failed to load global stats:", e);
                     ui.renderGlobalStats({ articles: 'N/A', users: 'N/A', sessions: 'N/A' });
                 }
            },

            async loadSubjectContent(subject) {
                ui.updateHeader(state.currentUser, state.currentUserData);
                document.getElementById('articles-section-title').textContent = `${state.subjects[subject].icon} 精選文章`;
                document.getElementById('leaderboard-section-title').textContent = `🏆 ${state.subjects[subject].name}得分排行榜`;

                ui.renderSkeletons('articlesGrid', 3, 'article-card');
                ui.renderSkeletons('leaderboardList', 5, 'leaderboard-item');
                
                try {
                    let articlesPromise;
                    if (subject === 'english') {
                        // For English, fetch all to include legacy articles without a subject field.
                        articlesPromise = state.db.collection('articles').get();
                    } else {
                        articlesPromise = state.db.collection('articles').where('subject', '==', subject).get();
                    }

                    const leaderboardPromise = state.db.collection('leaderboard').orderBy(`totalScore_${subject}`, 'desc').limit(10).get();
                    const [articlesSnap, leaderboardSnap] = await Promise.all([articlesPromise, leaderboardPromise]);
                    
                    let allArticles = articlesSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));

                    // Client-side filtering for subject (if English) and isActive status
                    if (subject === 'english') {
                        allArticles = allArticles.filter(article => article.subject === 'english' || article.subject === undefined);
                    }
                    
                    const articles = allArticles
                        .filter(article => article.isActive === true)
                        .sort((a, b) => (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0));
                    
                    state.articles = articles;
                    ui.renderArticles(state.articles);

                    const leaderboardUsers = leaderboardSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    ui.renderLeaderboard(leaderboardUsers);
                } catch (error) {
                    console.error(`Error loading ${subject} content:`, error);
                    const detail = `請檢查 Firestore 安全規則。錯誤: ${error.message}`;
                    ui.showError('載入內容失敗', detail);
                }
            },
            
            handleSubjectChange(subject) {
                if (state.currentSubject === subject) return;
                state.currentSubject = subject;
                document.querySelectorAll('.subject-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.subject === subject);
                });
                this.loadSubjectContent(subject);
            },
            
            async handleLogin(e) {
                e.preventDefault();
                const btn = document.getElementById('loginBtn');
                ui.setLoading(btn, true);
                ui.hideMessage('authMessageBox');
                try {
                    const email = document.getElementById('loginEmail').value;
                    const password = document.getElementById('loginPassword').value;
                    await state.auth.signInWithEmailAndPassword(email, password);
                    ui.showNotification('登入成功！', 'success');
                    ui.hideModal('authModal');
                    if (state.pendingArticleId) {
                       this.startTest(state.pendingArticleId);
                    }
                } catch (error) {
                    ui.showMessage('authMessageBox', '登入失敗：' + error.message, 'error');
                } finally {
                    ui.setLoading(btn, false);
                }
            },

            async handleLogout() {
                try {
                    await state.auth.signOut();
                    ui.showNotification('您已成功登出。', 'success');
                } catch (error) {
                    ui.showNotification('登出失敗：' + error.message, 'error');
                }
            },
            
            async handleChangeNickname(e) {
                e.preventDefault();
                const btn = document.getElementById('nicknameSubmitBtn');
                btn.disabled = true;
                const newNickname = document.getElementById('nicknameInput').value.trim();

                try {
                    const userDocRef = state.db.collection('leaderboard').doc(state.currentUser.uid);
                    await userDocRef.update({ nickname: newNickname });
                    ui.showNotification('暱稱更新成功！', 'success');
                    state.currentUserData.nickname = newNickname; // Update local state
                    ui.updateHeader(state.currentUser, state.currentUserData);
                    ui.hideModal('nicknameModal');
                } catch (error) {
                    ui.showNotification('更新失敗：' + error.message, 'error');
                } finally {
                    btn.disabled = false;
                }
            },

            filterArticles(query) {
                const lowerCaseQuery = query.toLowerCase();
                const filtered = state.articles.filter(article => article.title.toLowerCase().includes(lowerCaseQuery));
                ui.renderArticles(filtered);
            },

            startTest(articleId) {
                if (state.currentUser) {
                    window.location.href = `test.html?articleId=${articleId}`;
                } else {
                    state.pendingArticleId = articleId;
                    ui.showModal('authModal');
                }
            }
        };

        // --- Entry Point ---
        document.addEventListener('DOMContentLoaded', () => handlers.init());
    </script>
<script type="module" src="/index.tsx"></script>
</body>
