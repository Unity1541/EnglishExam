
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Reading Hub - 英文閱讀測驗平台</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <!-- Central Firebase Config -->
    <script src="firebase-config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #6366f1;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --error-color: #ef4444;
            --bg-primary: #0f0f1e;
            --bg-card: rgba(255, 255, 255, 0.05);
            --text-primary: #ffffff;
            --text-secondary: #cbd5e1;
            --text-accent: #fbbf24;
            --border-color: rgba(255, 255, 255, 0.1);
            --gradient-primary: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%);
            --gradient-gold: linear-gradient(135deg, #ffd700 0%, #ffb347 100%);
        }

        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }

        .background-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 20% 80%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(236, 72, 153, 0.15) 0%, transparent 50%);
            animation: backgroundFloat 20s ease-in-out infinite;
        }

        @keyframes backgroundFloat {
            0%, 100% { transform: translateY(0px); opacity: 0.8; }
            50% { transform: translateY(-20px); opacity: 1; }
        }
        
        .full-page-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            transition: opacity 0.3s ease;
            text-align: center;
            padding: 1rem;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid var(--border-color);
            border-top: 5px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .header {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 1rem 0;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo-icon {
            width: 3.5rem;
            height: 3.5rem;
            background: var(--gradient-primary);
            border-radius: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
        }

        .logo h1 {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .current-user {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .user-info-container {
             padding: 0.5rem 1rem;
            background: rgba(251, 191, 36, 0.1);
            border-radius: 2rem;
            border: 1px solid rgba(251, 191, 36, 0.2);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-info {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 0.2rem;
        }

        .user-nickname {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-accent);
        }

        .user-stats {
            font-size: 0.8rem;
            opacity: 0.8;
            color: var(--text-accent);
        }

        .change-nickname-btn {
            background: none;
            border: none;
            color: var(--text-accent);
            cursor: pointer;
            opacity: 0.7;
            font-size: 1.2rem;
            padding: 0.2rem;
        }
        .change-nickname-btn:hover {
            opacity: 1;
        }
        
        .login-btn {
            padding: 0.8rem 1.5rem;
            background: var(--primary-color);
            border: none;
            border-radius: 2rem;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.2);
        }
        
        .main-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 3rem 2rem;
            display: grid;
            grid-template-columns: 2.5fr 1fr;
            gap: 3rem;
        }

        .welcome-section {
            text-align: center;
            margin-bottom: 4rem;
            padding: 4rem 2rem;
            background: var(--bg-card);
            border-radius: 2rem;
            border: 1px solid var(--border-color);
        }

        .welcome-section h2 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
        }

        .welcome-section p {
            font-size: 1.3rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        .stats-row {
            display: flex;
            justify-content: center;
            gap: 3rem;
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            display: block;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .articles-section h3, .leaderboard-section h3 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .search-bar {
            flex-grow: 1;
            max-width: 400px;
        }
        
        .search-input {
            width: 100%;
            padding: 0.8rem 1.2rem;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--border-color);
            border-radius: 2rem;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .search-input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .articles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 2rem;
            min-height: 200px;
        }

        .article-card {
            background: var(--bg-card);
            border-radius: 1.5rem;
            overflow: hidden;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(20px);
            transition: all 0.4s ease;
            display: flex;
            flex-direction: column;
        }

        .article-card:hover {
            transform: translateY(-15px) scale(1.02);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            border-color: var(--primary-color);
        }
        
        .article-content-wrapper {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            padding: 2rem;
        }
        
        .article-badges {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .badge {
            padding: 0.4rem 1rem;
            border-radius: 1.5rem;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .difficulty-basic { background: rgba(16, 185, 129, 0.2); color: var(--success-color); }
        .difficulty-intermediate { background: rgba(245, 158, 11, 0.2); color: var(--warning-color); }
        .difficulty-advanced { background: rgba(239, 68, 68, 0.2); color: var(--error-color); }
        .category-badge { background: rgba(99, 102, 241, 0.2); color: var(--primary-color); }

        .article-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 1rem;
            line-height: 1.4;
        }

        .article-preview {
            color: var(--text-secondary);
            font-size: 1rem;
            line-height: 1.6;
        }

        .article-meta {
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
            border-top: 1px solid var(--border-color);
        }

        .meta-info {
            display: flex;
            gap: 1.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .start-test-btn {
            background: var(--gradient-primary);
            color: white;
            border: none;
            border-radius: 1rem;
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .leaderboard-section {
            background: var(--bg-card);
            border-radius: 1.5rem;
            padding: 2.5rem;
            border: 1px solid var(--border-color);
            height: fit-content;
            position: sticky;
            top: 8rem;
        }
        
        .leaderboard-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .leaderboard-item {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 1.2rem;
        }

        .leaderboard-item.current-user-highlight {
            background: rgba(251, 191, 36, 0.1);
            border: 1px solid rgba(251, 191, 36, 0.3);
        }

        .rank-badge {
            width: 3rem;
            height: 3rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .rank-1 { background: var(--gradient-gold); color: #000; }
        .rank-2 { background: linear-gradient(135deg, #c0c0c0, #a8a8a8); color: #000; }
        .rank-3 { background: linear-gradient(135deg, #cd7f32, #b8860b); color: #fff; }
        .rank-other { background: rgba(255, 255, 255, 0.1); color: var(--text-secondary); }

        .player-info { flex: 1; min-width: 0; }
        .player-name { font-weight: 600; margin-bottom: 0.25rem; font-size: 1.1rem; }
        .player-rank { font-size: 0.8rem; color: var(--text-accent); }
        .player-score { font-weight: 700; font-size: 1.3rem; }

        .nickname-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; opacity: 1; transition: opacity 0.3s ease;
        }
        .nickname-modal.hidden { opacity: 0; pointer-events: none; }

        .nickname-modal-content {
            background: var(--bg-card); border-radius: 2rem; padding: 3rem;
            border: 1px solid var(--border-color);
            max-width: 450px; width: 90%; text-align: center;
        }
        .modal-icon {
            width: 5rem; height: 5rem; background: var(--gradient-primary);
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; margin: 0 auto 2rem; font-size: 2.5rem;
        }
        .modal-title { font-size: 1.8rem; font-weight: 700; margin-bottom: 1rem; }
        .modal-description { color: var(--text-secondary); margin-bottom: 2.5rem; }

        .nickname-form { display: flex; flex-direction: column; gap: 1.5rem; }
        .nickname-modal-input {
            padding: 1.2rem; background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--border-color); border-radius: 1rem;
            color: var(--text-primary); font-size: 1.1rem; text-align: center;
            transition: all 0.3s ease;
        }
        .nickname-modal-input:focus {
            outline: none; border-color: var(--primary-color);
            background: rgba(255, 255, 255, 0.08);
        }
        .nickname-submit-btn {
            padding: 1.2rem 2rem; background: var(--gradient-primary); border: none;
            border-radius: 1rem; color: white; font-weight: 600;
            cursor: pointer; transition: all 0.3s ease; font-size: 1.1rem;
        }
        .nickname-submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .notification-container {
            position: fixed;
            top: 1rem; right: 1rem; z-index: 9999;
            display: flex; flex-direction: column; gap: 0.5rem;
            align-items: flex-end;
        }
        .notification {
            padding: 1rem 1.5rem; border-radius: 0.75rem;
            color: white; font-weight: 600;
            animation: slideInRight 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .notification.success { background: var(--success-color); }
        .notification.error { background: var(--error-color); }
        @keyframes slideInRight {
            from { transform: translateX(110%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .skeleton {
            background-color: rgba(255, 255, 255, 0.08); border-radius: 0.5rem;
            position: relative; overflow: hidden;
        }
        .skeleton::after {
            content: ''; position: absolute; top: 0; left: -150%;
            width: 150%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 0% { left: -150%; } 100% { left: 150%; } }
        .article-card.skeleton { height: 350px; cursor: default; }
        .article-card.skeleton:hover { transform: none; box-shadow: none; border-color: var(--border-color); }
        .leaderboard-item.skeleton { height: 90px; }


        @media (max-width: 1024px) {
            .main-content { grid-template-columns: 1fr; gap: 2rem; }
            .leaderboard-section { position: static; order: -1; }
        }
        @media (max-width: 768px) {
            .header-content { flex-direction: column; gap: 1.5rem; }
            .main-content { padding: 2rem 1rem; }
            .welcome-section h2 { font-size: 2.5rem; }
            .articles-grid { grid-template-columns: 1fr; }
        }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div class="background-animation"></div>
    <div id="notification-container" class="notification-container"></div>
    
    <div id="loader" class="full-page-loader">
        <div class="spinner"></div>
        <p>正在載入內容...</p>
    </div>

    <div class="nickname-modal hidden" id="nicknameModal">
        <div class="nickname-modal-content">
            <div class="modal-icon">👤</div>
            <h2 class="modal-title" id="nicknameModalTitle"></h2>
            <p class="modal-description" id="nicknameModalDescription"></p>
            <form class="nickname-form" onsubmit="return false;">
                <input type="text" class="nickname-modal-input" id="nicknameModalInput" placeholder="請輸入您的暱稱" maxlength="10" minlength="2">
                <button class="nickname-submit-btn" id="nicknameSubmitBtn" disabled></button>
            </form>
        </div>
    </div>

    <div id="app-container" style="display: none;">
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <div class="logo-icon">📚</div>
                    <h1>English Hub</h1>
                </div>
                <div class="header-actions">
                    <div class="current-user" id="currentUserInfo" style="display: none;">
                        <div class="user-info-container">
                            <div class="user-info">
                                <div class="user-nickname">👋 您好，<span id="displayNickname"></span></div>
                                <div class="user-stats" id="userStats"></div>
                            </div>
                            <button class="change-nickname-btn" id="changeNicknameBtn" title="更改暱稱">✏️</button>
                        </div>
                    </div>
                    <div id="guestUserInfo">
                        <a href="admin_login.html" class="login-btn">🔐 管理員登入</a>
                    </div>
                </div>
            </div>
        </header>

        <main class="main-content">
            <div class="content-left">
                <section class="welcome-section">
                    <h2>開始你的英文閱讀之旅</h2>
                    <p>精選優質文章，挑戰不同難度等級，提升英文閱讀理解能力並登上排行榜！</p>
                    <div class="stats-row">
                        <div class="stat-item"><span class="stat-number" id="totalArticles">--</span><div class="stat-label">精選文章</div></div>
                        <div class="stat-item"><span class="stat-number" id="totalTests">--</span><div class="stat-label">測驗次數</div></div>
                        <div class="stat-item"><span class="stat-number" id="totalUsers">--</span><div class="stat-label">學習者</div></div>
                    </div>
                </section>
                
                <div id="emptyState" style="display: none; text-align: center; padding: 4rem 2rem; background: var(--bg-card); border-radius: 1.5rem; border: 1px solid var(--border-color);">
                    <div style="font-size: 4rem; margin-bottom: 1.5rem;">🏗️</div>
                    <h3 style="font-size: 2rem; font-weight: 700; color: var(--text-primary);">系統正在準備中</h3>
                    <p style="font-size: 1.1rem; color: var(--text-secondary); margin-top: 1rem;">我們的管理員正在努力新增第一批閱讀文章。<br>請稍後再來看看，精彩內容即將上線！</p>
                </div>

                <section class="articles-section">
                    <div class="section-header">
                        <h3>📖 精選文章</h3>
                        <div class="search-bar">
                            <input type="search" id="articleSearchInput" class="search-input" placeholder="搜尋文章標題...">
                        </div>
                    </div>
                    <div class="articles-grid" id="articlesGrid"></div>
                    <p id="noResultsMessage" style="display:none; text-align:center; padding: 2rem;">找不到相關文章。</p>
                </section>
            </div>

            <aside class="leaderboard-section">
                <h3>🏆 得分排行榜</h3>
                <div class="leaderboard-list" id="leaderboardList"></div>
            </aside>
        </main>
    </div>

    <script>
        // --- App State ---
        const state = {
            db: null,
            auth: null,
            currentUser: null,
            currentUserData: null,
            articles: [],
            pendingArticleId: null // Store article ID when login is required
        };
        
        // --- UI Module ---
        const ui = {
            loader: document.getElementById('loader'),
            appContainer: document.getElementById('app-container'),
            notificationContainer: document.getElementById('notification-container'),
            articlesSection: document.querySelector('.articles-section'),
            leaderboardSection: document.querySelector('.leaderboard-section'),
            emptyState: document.getElementById('emptyState'),
            
            showError(message, details = '') {
                this.loader.style.display = 'flex';
                this.loader.innerHTML = `<div style="color: var(--error-color);">❌ ${message}</div><p>${details}</p>`;
            },

            hideLoader() {
                this.loader.style.opacity = '0';
                setTimeout(() => { this.loader.style.display = 'none'; }, 300);
            },

            showNotification(message, type = 'success', duration = 3000) {
                const notification = document.createElement('div');
                notification.className = `notification ${type}`;
                notification.textContent = message;
                this.notificationContainer.appendChild(notification);
                setTimeout(() => {
                    notification.style.opacity = '0';
                    notification.style.transform = 'translateX(110%)';
                    setTimeout(() => notification.remove(), 400);
                }, duration);
            },
            
            renderSkeletons(containerId, count, skeletonClass) {
                const container = document.getElementById(containerId);
                container.innerHTML = Array(count).fill(`<div class="${skeletonClass} skeleton"></div>`).join('');
            },

            renderGlobalStats(stats) {
                document.getElementById('totalArticles').textContent = stats.articles;
                document.getElementById('totalUsers').textContent = stats.users;
                document.getElementById('totalTests').textContent = stats.sessions.toLocaleString();
            },
            
            renderArticles(articles) {
                const grid = document.getElementById('articlesGrid');
                const noResults = document.getElementById('noResultsMessage');
                grid.innerHTML = '';
                if (articles.length === 0) {
                    noResults.style.display = 'block';
                    return;
                }
                noResults.style.display = 'none';
                articles.forEach(article => {
                    const card = document.createElement('div');
                    card.className = 'article-card';
                    card.innerHTML = `
                        <div class="article-content-wrapper">
                            <div class="article-badges">
                                <span class="badge difficulty-${article.difficulty}">${article.difficulty}</span>
                                <span class="badge category-badge">${article.category}</span>
                            </div>
                            <h3 class="article-title">${article.title}</h3>
                            <p class="article-preview">${article.content.substring(0, 100)}...</p>
                        </div>
                        <div class="article-meta">
                            <div class="meta-info">
                                <div class="meta-item"><span>📝</span><span>${article.questionCount}題</span></div>
                                <div class="meta-item"><span>⏱️</span><span>${article.estimatedReadingTime}分鐘</span></div>
                            </div>
                            <button class="start-test-btn" data-id="${article.id}">開始測驗</button>
                        </div>`;
                    grid.appendChild(card);
                });
            },

            renderLeaderboard(users) {
                const list = document.getElementById('leaderboardList');
                list.innerHTML = '';
                if (users.length === 0) {
                    list.innerHTML = '<p>排行榜尚無資料。</p>'; return;
                }
                users.forEach((user, index) => {
                    const rank = index + 1;
                    const rankClass = rank <= 3 ? `rank-${rank}` : 'rank-other';
                    const item = document.createElement('div');
                    item.className = 'leaderboard-item';
                    if (state.currentUserData && user.id === state.currentUserData.uid) {
                        item.classList.add('current-user-highlight');
                    }
                    item.innerHTML = `
                        <div class="rank-badge ${rankClass}">${rank}</div>
                        <div class="player-info">
                            <div class="player-name">${user.nickname}</div>
                            <div class="player-rank">${user.rank || '新手級'}</div>
                        </div>
                        <div class="player-score">${user.totalScore || 0}</div>`;
                    list.appendChild(item);
                });
            },
            
            updateHeader(user, userData) {
                const guestInfo = document.getElementById('guestUserInfo');
                const userInfo = document.getElementById('currentUserInfo');
                if (user && userData) {
                    document.getElementById('displayNickname').textContent = userData.nickname;
                    document.getElementById('userStats').textContent = `等級: ${userData.rank || '新手級'} | 總分: ${userData.totalScore || 0}`;
                    guestInfo.style.display = 'none';
                    userInfo.style.display = 'flex';
                } else {
                    guestInfo.style.display = 'block';
                    userInfo.style.display = 'none';
                }
            },

            showNicknameModal(isNewUser) {
                const modal = document.getElementById('nicknameModal');
                document.getElementById('nicknameModalTitle').textContent = isNewUser ? '歡迎來到英文閱讀測驗' : '更改您的暱稱';
                document.getElementById('nicknameModalDescription').textContent = isNewUser ? '請設定您的暱稱，即可開始測驗。' : '請輸入您的新暱稱。';
                document.getElementById('nicknameSubmitBtn').textContent = isNewUser ? '🚀 開始測驗' : '💾 儲存變更';
                if (!isNewUser && state.currentUserData) document.getElementById('nicknameModalInput').value = state.currentUserData.nickname;
                else document.getElementById('nicknameModalInput').value = '';
                modal.classList.remove('hidden');
                setTimeout(() => document.getElementById('nicknameModalInput').focus(), 100);
            },

            hideNicknameModal() {
                document.getElementById('nicknameModal').classList.add('hidden');
                state.pendingArticleId = null;
            }
        };
        
        // --- Handlers & Logic ---
        const handlers = {
            async init() {
                if (!firebase.apps.length) {
                    return ui.showError('設定錯誤', '請在 firebase-config.js 檔案中填寫真實的 Firebase 設定。');
                }
                state.db = firebase.firestore();
                state.auth = firebase.auth();
                this.setupEventListeners();
                this.loadPublicContent();
                this.handleAuthentication();
            },

            setupEventListeners() {
                document.getElementById('nicknameSubmitBtn').addEventListener('click', () => this.setNickname());
                const nicknameInput = document.getElementById('nicknameModalInput');
                nicknameInput.addEventListener('input', () => {
                    const len = nicknameInput.value.trim().length;
                    document.getElementById('nicknameSubmitBtn').disabled = len < 2 || len > 10;
                });
                document.getElementById('changeNicknameBtn').addEventListener('click', () => ui.showNicknameModal(false));
                document.getElementById('articlesGrid').addEventListener('click', e => {
                    const btn = e.target.closest('.start-test-btn');
                    if (btn) this.startTest(btn.dataset.id);
                });
                document.getElementById('articleSearchInput').addEventListener('input', e => this.filterArticles(e.target.value));
            },
            
            handleAuthentication() {
                state.auth.onAuthStateChanged(async user => {
                    state.currentUser = user;
                    if (user) {
                        const userDoc = await state.db.collection('leaderboard').doc(user.uid).get();
                        if (userDoc.exists) {
                            state.currentUserData = { uid: user.uid, ...userDoc.data() };
                        } else {
                            state.currentUserData = null; // User authenticated but no profile yet
                        }
                    } else {
                        state.currentUserData = null;
                    }
                    ui.updateHeader(state.currentUser, state.currentUserData);
                });
            },

            async loadPublicContent() {
                ui.appContainer.style.display = 'block';
                ui.renderSkeletons('articlesGrid', 3, 'article-card');
                ui.renderSkeletons('leaderboardList', 5, 'leaderboard-item');
                
                try {
                    const articlesPromise = state.db.collection('articles').where('isActive', '==', true).get();
                    const leaderboardPromise = state.db.collection('leaderboard').orderBy('totalScore', 'desc').limit(10).get();
                    const statsPromises = Promise.all([
                        state.db.collection('articles').where('isActive', '==', true).get().then(s => s.size),
                        state.db.collection('leaderboard').get().then(s => s.size),
                        state.db.collection('test-sessions').get().then(s => s.size)
                    ]);

                    const [articlesSnap, leaderboardSnap, [articlesCount, usersCount, sessionsCount]] = await Promise.all([articlesPromise, leaderboardPromise, statsPromises]);
                    
                    ui.renderGlobalStats({ articles: articlesCount, users: usersCount, sessions: sessionsCount });

                    if (articlesSnap.empty) {
                        ui.articlesSection.style.display = 'none';
                        ui.leaderboardSection.style.display = 'none';
                        ui.emptyState.style.display = 'block';
                    } else {
                        ui.articlesSection.style.display = 'block';
                        ui.leaderboardSection.style.display = 'block';
                        ui.emptyState.style.display = 'none';

                        const articles = articlesSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        articles.sort((a, b) => (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0));
                        state.articles = articles;
                        ui.renderArticles(state.articles);

                        const leaderboardUsers = leaderboardSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        ui.renderLeaderboard(leaderboardUsers);
                    }
                    
                    ui.hideLoader();
                } catch (error) {
                    console.error("Error loading public content:", error);
                    let detail = `請檢查 Firestore 安全規則。錯誤: ${error.message}`;
                    if (error.message.includes("index")) {
                        detail = `資料庫需要建立複合索引。請按照 firebase_setup_guide.md 中的指示建立索引。`;
                    }
                    ui.showError('載入內容失敗', detail);
                }
            },

            async setNickname() {
                const btn = document.getElementById('nicknameSubmitBtn');
                btn.disabled = true;
                const nickname = document.getElementById('nicknameModalInput').value.trim();
                
                try {
                    // Ensure anonymous user exists
                    if (!state.currentUser) {
                       const cred = await state.auth.signInAnonymously();
                       state.currentUser = cred.user;
                    }

                    const userDocRef = state.db.collection('leaderboard').doc(state.currentUser.uid);
                    
                    if (state.currentUserData) { // Updating nickname
                        await userDocRef.update({ nickname });
                        ui.showNotification('暱稱更新成功！', 'success');
                    } else { // New user
                        await userDocRef.set({
                            nickname, totalScore: 0, rank: '新手級',
                            testsCompleted: 0, achievements: [],
                            createdAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                        ui.showNotification('歡迎！暱稱設定成功！', 'success');
                    }
                    
                    ui.hideNicknameModal();
                    await this.handleAuthentication(); // Refresh user data and header
                    
                    // If a test was pending, start it now
                    if (state.pendingArticleId) {
                        window.location.href = `test.html?articleId=${state.pendingArticleId}`;
                    }

                } catch (error) {
                    ui.showNotification('操作失敗: ' + error.message, 'error');
                } finally {
                    btn.disabled = false;
                }
            },
            
            filterArticles(query) {
                const lowerCaseQuery = query.toLowerCase();
                const allCards = document.querySelectorAll('.article-card');
                let isResultFound = false;

                allCards.forEach(card => {
                    const title = card.querySelector('.article-title').textContent.toLowerCase();
                    const shouldShow = title.includes(lowerCaseQuery);
                    card.style.display = shouldShow ? 'flex' : 'none';
                    if (shouldShow) isResultFound = true;
                });
                
                document.getElementById('noResultsMessage').style.display = isResultFound ? 'none' : 'block';
            },


            startTest(articleId) {
                if (state.currentUser && state.currentUserData) {
                    window.location.href = `test.html?articleId=${articleId}`;
                } else {
                    state.pendingArticleId = articleId;
                    ui.showNicknameModal(true);
                }
            }
        };

        // --- Entry Point ---
        document.addEventListener('DOMContentLoaded', () => handlers.init());
    </script>
<script type="module" src="/index.tsx"></script>
</body>
